<div>
  <p>Сейчас у нас: {{ DateTime() | date: 'dd.mm.yyyy h:mm' }}</p>
  <p>У вас на счету: {{ 25673541 | currency: 'RUB' : 'symbol-narrow' }}</p>
  @for (user of users(); track user.id) {
    <a routerLink="/users/{{ user.id }}">
      <div class="grid grid-cols-2n">
        <div class="rounded-2xl p-4 border border-amber-500 w-max">
          <p>{{ user.name }}</p>
          <p>{{ user.phone }}</p>
          <p>{{ user.email }}</p>
        </div>
      </div>
    </a>
  }
</div>
